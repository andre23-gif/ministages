<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Saisie d'un mini-stage</title>
  <link rel="stylesheet" href="style.css">

  <style>
    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 20px;
      flex-wrap: wrap;
    }

    .header-text {
      flex: 1;
      min-width: 260px;
    }

    .header-user {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 10px;
      min-width: 220px;
    }

    .header-user p {
      margin: 0;
      color: white;
      font-weight: 600;
      text-align: right;
    }

    .header-user button {
      margin: 0;
    }

    .page-form {
      display: grid;
      grid-template-columns: repeat(2, minmax(240px, 1fr));
      gap: 18px 20px;
      align-items: end;
    }

    .page-form p {
      margin: 0;
    }

    .page-form label {
      display: inline-block;
      margin-bottom: 8px;
      font-weight: 700;
      color: var(--bleu-fonce);
      font-size: 0.98rem;
    }

    .page-form input,
    .page-form select {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--bordure);
      border-radius: 14px;
      font-size: 1rem;
      color: var(--texte);
      background: var(--blanc);
      box-shadow: inset 0 1px 2px rgba(15, 23, 42, 0.04);
      box-sizing: border-box;
    }

    .page-form input:focus,
    .page-form select:focus {
      outline: none;
      border-color: var(--bleu);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
    }

    .page-form .large {
      grid-column: 1 / -1;
    }

    .form-actions {
      grid-column: 1 / -1;
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #e5e7eb;
    }

    .form-actions button {
      margin: 0;
    }

    @media (max-width: 800px) {
      .page-form {
        grid-template-columns: 1fr;
      }

      .page-form .large,
      .form-actions {
        grid-column: auto;
      }

      .header-top {
        flex-direction: column;
      }

      .header-user {
        align-items: flex-start;
      }

      .header-user p {
        text-align: left;
      }

      .form-actions {
        flex-direction: column;
      }

      .form-actions button {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <header>
    <div class="header-top">
      <div class="header-text">
        <h1>Saisie d’un mini-stage</h1>
        <p>
          Enregistrez un mini-stage pour un élève de 3ème :
          classe, identité, date, horaires, lieu, formation,
          état de la convention et présence au stage.
        </p>
      </div>

      <div class="header-user">
        <p>Connecté : <strong id="user-email"></strong></p>
        <button type="button" onclick="logoutUser()">Déconnexion</button>
      </div>
    </div>
  </header>

  <main>
    <section>
      <h2>Nouvelle fiche élève</h2>

      <form class="page-form">
        <p>
          <label for="classe">Classe</label><br>
          <select id="classe" name="classe">
            <option value="">Choisir une classe</option>
            <option>3°1</option>
            <option>3°2</option>
            <option>3°3</option>
            <option>3°4</option>
            <option>3°5</option>
            <option>3°6</option>
            <option>3°7</option>
          </select>
        </p>

        <p>
          <label for="semaine">Semaine</label><br>
          <select id="semaine" name="semaine">
            <option value="">Choisir une semaine</option>
            <option>1</option>
            <option>2</option>
            <option>3</option>
            <option>4</option>
            <option>5</option>
            <option>6</option>
            <option>7</option>
            <option>8</option>
            <option>9</option>
            <option>10</option>
            <option>11</option>
            <option>12</option>
            <option>13</option>
            <option>14</option>
            <option>15</option>
            <option>16</option>
            <option>17</option>
            <option>18</option>
            <option>19</option>
            <option>20</option>
            <option>21</option>
            <option>22</option>
            <option>23</option>
            <option>24</option>
            <option>25</option>
            <option>26</option>
            <option>27</option>
            <option>28</option>
            <option>29</option>
            <option>30</option>
            <option>31</option>
            <option>32</option>
            <option>33</option>
            <option>34</option>
            <option>35</option>
            <option>36</option>
            <option>37</option>
            <option>38</option>
            <option>39</option>
            <option>40</option>
            <option>41</option>
            <option>42</option>
            <option>43</option>
            <option>44</option>
            <option>45</option>
            <option>46</option>
            <option>47</option>
            <option>48</option>
            <option>49</option>
            <option>50</option>
            <option>51</option>
            <option>52</option>
          </select>
        </p>

        <p>
          <label for="nom">Nom</label><br>
          <input type="text" id="nom" name="nom" placeholder="Nom de l'élève">
        </p>

        <p>
          <label for="prenom">Prénom</label><br>
          <input type="text" id="prenom" name="prenom" placeholder="Prénom de l'élève">
        </p>

        <p>
          <label for="date_stage">Date</label><br>
          <input type="date" id="date_stage" name="date_stage">
        </p>

        <p>
          <label for="heure_debut">Heure de début</label><br>
          <input type="time" id="heure_debut" name="heure_debut">
        </p>

        <p>
          <label for="heure_fin">Heure de fin</label><br>
          <input type="time" id="heure_fin" name="heure_fin">
        </p>

        <p class="large">
          <label for="lieu">Lieu</label><br>
          <select id="lieu" name="lieu">
            <option value="">Choisir un lieu</option>
          </select>
        </p>

        <p class="large">
          <label for="formation">Formation</label><br>
          <select id="formation" name="formation">
            <option value="">Choisir une formation</option>
          </select>
        </p>

        <p class="large">
          <label for="etat_convention">État de la convention</label><br>
          <select id="etat_convention" name="etat_convention">
            <option>?</option>
            <option>Accord famille</option>
            <option>Conventions distribuées</option>
            <option>Conventions signées</option>
            <option>Conventions expédiées</option>
            <option>Dates bloquées</option>
          </select>
        </p>

        <p class="large">
          <label for="presence_stage">Présence au stage</label><br>
          <select id="presence_stage" name="presence_stage">
            <option>?</option>
            <option>Absence au stage</option>
            <option>Présent au stage</option>
            <option>Stage reprogrammé</option>
          </select>
        </p>

        <div class="form-actions">
          <button type="submit">Enregistrer</button>
          <button type="button" onclick="window.location.href='index.html'">Retour à l’accueil</button>
        </div>
      </form>
    </section>
  </main>

  <footer>
    <p>Application de suivi interne – mini-stages 3ème</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
</body>
</html>
